name: 01- 🎬 Youtube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: '90'
        type: string
      save_in_new_branch:
        description: 'Save the video into a new branch'
        required: true
        default: true
        type: boolean

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: warp-image.tar
          key: warp-image-${{ runner.os }}-v1   # bump 'v1' to 'v2' when you want to refresh

      - name: Load or pull WARP image
        run: |
          if [ -f warp-image.tar ]; then
            echo "🔄 Loading WARP image from cache..."
            docker load < warp-image.tar
          else
            echo "⬇️ Pulling WARP image..."
            docker pull caomingjun/warp
            docker save caomingjun/warp -o warp-image.tar
          fi

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-packages-${{ runner.os }}-v1

      - name: Install all packages
        run: |
          if [ -d ~/apt-cache ]; then
            echo "📦 Using cached apt packages..."
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg python3-pip zip curl jq

          # Cache the debs for next time
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/
          sudo chmod 644 ~/apt-cache/*.deb

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-ytdlp-v1
          restore-keys: |
            pip-${{ runner.os }}-ytdlp-

      - name: Install yt-dlp
        run: pip3 install --upgrade yt-dlp

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "⏳ Waiting for WARP to initialize (30 seconds)..."
          echo "🔍 Checking WARP status..."
          for i in {1..30}; do
            sleep 1
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "✅ WARP proxy is ready!"
          else
            echo "⚠️ WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi


      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          mkdir -p videos tmp_downloads

          echo ""
          echo "📹 Downloading: $URL"
          echo "📊 Quality: $QUALITY"

          ./scripts/download_with_ytdl.sh \
            -o tmp_downloads \
            -q $QUALITY \
            -u $URL

          echo "✅ Download complete!"
          ls -la tmp_downloads/

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            filename_normalized=$(basename "$FILE" | tr -c '[:alnum:]' _)
            outdir="videos/$filename_normalized"
            mkdir "$outdir"
            ./scripts/partition_file_into_zips.sh \
              "$FILE" \
              "$outdir" \
              "$SPLIT_BYTES"
          done
          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          if [ "${{ github.event.inputs.save_in_new_branch }}" == "true" ]; then
            BRANCH="$(date | tr -c '[:alnum:]' '_')_$(ls -la videos| sha1sum | cut -f 1 -d ' ')"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Preparing to commit files..."

          # Check if videos folder has any files
          if [ ! -d "videos" ] || [ -z "$(ls -A videos 2>/dev/null)" ]; then
            echo "❌ No files to commit in videos folder"
            exit 1
          fi

          echo "📦 Total files to push: $(find videos -type f | wc -l)"

          for dir in $(find videos -mindepth 1 -maxdepth 1 -type d); do
            git add -f $dir # ← اینجا -f اضافه شد
            echo commiting $dir
            git commit -m "YT-DL: $dir"

            # Pull with rebase before each push
            git push --set-upstream origin HEAD:"$BRANCH"
          done

          echo "🎉 All $TOTAL files pushed"
